<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DM</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#f3f4f6;margin:0;padding:16px;color:#111827;}
    .card{max-width:520px;margin:0 auto 12px;background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:12px;}
    .row{display:flex;gap:10px;align-items:center;}
    button{cursor:pointer;border:1px solid #d1d5db;background:#fff;border-radius:10px;padding:10px 12px;font-weight:500;}
    button.primary{background:#2563eb;color:#fff;border-color:#2563eb;}
    button.danger{background:#fee2e2;color:#b91c1c;border-color:#fecaca;}

    .title{font-size:16px;font-weight:600;margin:0;}
    .muted{color:#6b7280;font-size:13px;}

    /* Users */
    #users{display:flex;flex-wrap:wrap;gap:10px;}
    .userBtn{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:12px;border:1px solid #e5e7eb;background:#fff;cursor:pointer;}
    .userBtn:hover{border-color:#cbd5e1;}
    .avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;background:#e5e7eb;display:block;}
    .userName{font-size:14px;font-weight:500;white-space:nowrap;max-width:220px;overflow:hidden;text-overflow:ellipsis;}

    /* Chat */
    #chat{height:320px;overflow:auto;border:1px solid #e5e7eb;border-radius:10px;padding:10px;background:#fafafa;}
    .msg{max-width:75%;padding:8px 12px;border-radius:16px;margin:6px 0;white-space:pre-wrap;word-break:break-word;font-weight:400;}
    .me{background:#2563eb;color:#fff;margin-left:auto;border-bottom-right-radius:6px;}
    .other{background:#e5e7eb;color:#111827;margin-right:auto;border-bottom-left-radius:6px;}

    input{width:100%;border:1px solid #d1d5db;border-radius:10px;padding:10px 12px;font-size:14px;}
    .send{width:44px;height:40px;border-radius:10px;border:1px solid #2563eb;background:#2563eb;color:#fff;font-weight:600;}
    .send:disabled{border-color:#9ca3af;background:#9ca3af;cursor:not-allowed;}

    .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;}
    .meBlock{display:flex;align-items:center;gap:10px;min-width:0;}
    .meName{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  </style>
</head>
<body>

  <div id="loginCard" class="card">
    <div class="topbar">
      <div>
        <div class="title">DM</div>
        <div class="muted">Вход через Google</div>
      </div>
      <button id="loginBtn" class="primary">Войти</button>
    </div>
  </div>

  <div id="app" style="display:none;">
    <div class="card">
      <div class="topbar">
        <div class="meBlock">
          <img id="mePhoto" class="avatar" alt="">
          <div class="meName" id="meName"></div>
        </div>
        <button id="logoutBtn" class="danger">Выйти</button>
      </div>
    </div>

    <div class="card">
      <div class="title" style="margin-bottom:10px;">Собеседники</div>
      <div id="users" class="muted">Загрузка...</div>
    </div>

    <div class="card">
      <div id="chatTitle" class="title" style="margin-bottom:10px;">Выберите собеседника</div>
      <div id="chat"></div>
      <div class="row" style="margin-top:10px;">
        <input id="text" placeholder="Сообщение..." disabled />
        <button id="sendBtn" class="send" disabled>▶</button>
      </div>
      <div class="muted" id="hint" style="margin-top:8px;"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import {
      getFirestore, collection, addDoc, query, where, onSnapshot,
      serverTimestamp, doc, setDoc, getDocs
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
    import {
      getAuth, GoogleAuthProvider, signInWithPopup,
      signOut, onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDDQUDZAHu1eYxxEAjG1n0d1AfcUXtz1jE",
      authDomain: "is-po233.firebaseapp.com",
      projectId: "is-po233",
      storageBucket: "is-po233.firebasestorage.app",
      messagingSenderId: "1083602801160",
      appId: "1:1083602801160:web:5f033d32c2d9efb0cbf7bd"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const $ = (id) => document.getElementById(id);
    const loginCard = $("loginCard");
    const appEl = $("app");
    const usersEl = $("users");
    const chatEl = $("chat");
    const chatTitle = $("chatTitle");
    const textEl = $("text");
    const sendBtn = $("sendBtn");
    const hintEl = $("hint");

    let me = null;
    let peer = null;
    let unsubMsgs = null;

    function convId(a, b) {
      return [a, b].sort().join("_");
    }

    function setHint(t) {
      hintEl.textContent = t || "";
    }

    function avatarUrlFromName(name) {
      return `https://ui-avatars.com/api/?name=${encodeURIComponent(name || 'U')}&background=2563eb&color=fff&bold=true`;
    }

    $("loginBtn").onclick = () => signInWithPopup(auth, provider);
    $("logoutBtn").onclick = () => signOut(auth);

    async function loadUsers() {
      usersEl.innerHTML = "";
      const snap = await getDocs(collection(db, "users"));
      let count = 0;

      snap.forEach((d) => {
        const u = d.data();
        if (!u?.uid || u.uid === me.uid) return;
        count++;

        const btn = document.createElement("div");
        btn.className = "userBtn";
        btn.onclick = () => selectPeer(u);

        const img = document.createElement("img");
        img.className = "avatar";
        img.alt = "";
        img.src = u.photo || avatarUrlFromName(u.name);

        const name = document.createElement("div");
        name.className = "userName";
        name.textContent = u.name || "Пользователь";

        btn.appendChild(img);
        btn.appendChild(name);
        usersEl.appendChild(btn);
      });

      if (!count) usersEl.textContent = "Нет других пользователей";
    }

    function renderMessages(allDocs) {
      if (!me || !peer) {
        chatEl.innerHTML = "";
        return;
      }

      const cid = convId(me.uid, peer.uid);
      const msgs = [];

      for (const d of allDocs) {
        const m = d.data();
        if (m.conversationId !== cid) continue;
        msgs.push(m);
      }

      msgs.sort((a, b) => {
        const ta = a.timestamp?.seconds ?? 0;
        const tb = b.timestamp?.seconds ?? 0;
        return ta - tb;
      });

      chatEl.innerHTML = "";
      if (!msgs.length) {
        chatEl.innerHTML = '<div class="muted">Сообщений пока нет</div>';
        return;
      }

      for (const m of msgs) {
        const div = document.createElement("div");
        div.className = "msg " + (m.senderId === me.uid ? "me" : "other");
        div.textContent = m.text || "";
        chatEl.appendChild(div);
      }
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function selectPeer(u) {
      peer = u;
      chatTitle.textContent = "Чат с: " + (u.name || "Пользователь");
      textEl.disabled = false;
      sendBtn.disabled = false;
      setHint("");

      if (unsubMsgs) unsubMsgs();

      const q = query(
        collection(db, "messages"),
        where("members", "array-contains", me.uid)
      );

      unsubMsgs = onSnapshot(
        q,
        (snap) => renderMessages(snap.docs),
        (err) => {
          console.error(err);
          setHint((err?.code || "error") + ": " + (err?.message || err));
          chatEl.innerHTML = '<div class="muted">Ошибка доступа</div>';
        }
      );
    }

    async function send() {
      const text = textEl.value.trim();
      if (!text || !me || !peer) return;

      sendBtn.disabled = true;
      try {
        const members = [me.uid, peer.uid].sort();
        await addDoc(collection(db, "messages"), {
          conversationId: members.join("_"),
          members,
          senderId: me.uid,
          receiverId: peer.uid,
          text,
          timestamp: serverTimestamp(),
        });
        textEl.value = "";
        textEl.focus();
      } catch (e) {
        console.error(e);
        alert((e?.code || "error") + ": " + (e?.message || e));
      } finally {
        sendBtn.disabled = false;
      }
    }

    sendBtn.onclick = send;
    textEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") send();
    });

    onAuthStateChanged(auth, async (user) => {
      peer = null;
      if (unsubMsgs) unsubMsgs();
      unsubMsgs = null;

      chatEl.innerHTML = "";
      chatTitle.textContent = "Выберите собеседника";
      textEl.value = "";
      textEl.disabled = true;
      sendBtn.disabled = true;
      setHint("");

      if (!user) {
        me = null;
        loginCard.style.display = "block";
        appEl.style.display = "none";
        return;
      }

      await user.getIdToken(true);

      me = user;
      loginCard.style.display = "none";
      appEl.style.display = "block";

      const displayName = user.displayName || "Без имени";
      $("meName").textContent = displayName;
      $("mePhoto").src = user.photoURL || avatarUrlFromName(displayName);

      await setDoc(doc(db, "users", user.uid), {
        uid: user.uid,
        name: displayName,
        photo: user.photoURL || null,
      }, { merge: true });

      await loadUsers();
    });
  </script>
</body>
</html>
